# ============================================================
# Stock Selector 子 Agent 配置文件
# ============================================================
# 用于配置多因子选股策略的全局参数、市场环境判断、因子权重和过滤规则
# ============================================================

# ------------------------------------------------------------
# 一、全局设置 (Global Settings)
# ------------------------------------------------------------
global_settings:
  # 数据源配置
  data_source: akshare          # 数据来源：akshare(主)/eastmoney(备用)

  # 缓存配置
  cache:
    enabled: true               # 是否启用本地缓存，减少 API 请求
    path: "data"                # 缓存数据保存目录
    ttl_days: 3                 # 缓存有效期（天），超过则重新下载

  # API 重试策略
  retry:
    max_attempts: 3             # 最大重试次数，应对网络波动
    backoff_seconds: 2          # 重试等待时间（秒），指数退避基数

  # 日志配置
  logging:
    level: INFO                 # 日志级别：DEBUG/INFO/WARNING/ERROR
    save_backtest: true         # 是否保存回测日志到本地

  # 回测配置
  backtest:
    log_dir: "backtest_logs"    # 回测日志保存目录
    tracking_days: 5            # 跟踪选股后 N 个交易日的表现


# ------------------------------------------------------------
# 二、市场环境开关 (Market Regime Switch)
# ------------------------------------------------------------
# 根据市场成交量和趋势判断当前所处环境，动态调整因子权重
# 成交量单位：亿元人民币（全市场日均成交额）
# ------------------------------------------------------------
market_regime:
  # 成交量阈值定义
  volume_thresholds:
    # 极度缩量：市场交投清淡，通常出现在熊市底部或重大事件前夕
    # 经济学意义：流动性枯竭，投资者参与度低，防御为主
    extremely_low: 6000         # 全市场成交额 < 6000 亿

    # 缩量：市场情绪偏冷，交投不活跃
    # 经济学意义：风险偏好下降，资金观望情绪浓厚
    low: 8000                   # 全市场成交额 6000-8000 亿

    # 正常：市场运行在合理区间
    # 经济学意义：多空平衡，结构性行情为主
    normal: 10000               # 全市场成交额 8000-10000 亿

    # 放量：市场情绪升温，资金入场积极
    # 经济学意义：风险偏好提升，增量资金进场
    high: 12000                 # 全市场成交额 10000-12000 亿

    # 极度放量：市场情绪高涨，可能接近阶段性顶部
    # 经济学意义：过热信号，需警惕回调风险
    extremely_high: 15000       # 全市场成交额 > 15000 亿

  # 趋势判断阈值（基于上证指数）
  trend_thresholds:
    # 均线周期判断
    ma_short: 20                # 短期均线周期
    ma_mid: 60                  # 中期均线周期
    ma_long: 120                # 长期均线周期

    # 牛市：价格在长期均线上方且均线多头排列
    # 经济学意义：经济扩张期，企业盈利改善，估值提升
    bull_threshold: 1.05        # 价格/MA120 > 1.05 认定为牛市

    # 熊市：价格在长期均线下方且均线空头排列
    # 经济学意义：经济收缩期，企业盈利下滑，估值压缩
    bear_threshold: 0.95        # 价格/MA120 < 0.95 认定为熊市

  # 模式映射表：成交量 + 趋势 -> 模式名称
  # 用于匹配下方的动态权重配置
  regime_mapping:
    # 熊市 + 极度缩量 = 缩量防御模式
    # 经济学意义：市场底部区域，流动性匮乏，以防守为主，等待反转信号
    "bear_extremely_low_volume": "缩量防御"

    # 熊市 + 缩量 = 防守观望模式
    # 经济学意义：下跌趋势中量能不足，反弹无力，继续观望
    "bear_low_volume": "防守观望"

    # 熊市 + 正常/放量 = 反弹博弈模式
    # 经济学意义：下跌趋势中的反弹行情，轻仓参与，快进快出
    "bear_normal_volume": "反弹博弈"
    "bear_high_volume": "反弹博弈"

    # 震荡市 + 缩量 = 区间震荡模式
    # 经济学意义：方向不明，量能不足，高抛低吸策略
    "range_low_volume": "区间震荡"

    # 震荡市 + 正常 = 结构性行情模式
    # 经济学意义：指数横盘，板块轮动，精选个股
    "range_normal_volume": "结构性行情"

    # 震荡市 + 放量 = 突破酝酿模式
    # 经济学意义：量能积累，可能选择方向，关注突破信号
    "range_high_volume": "突破酝酿"

    # 牛市 + 正常/放量 = 放量进攻模式
    # 经济学意义：上升趋势确认，量价配合，积极参与
    "bull_normal_volume": "放量进攻"
    "bull_high_volume": "放量进攻"

    # 牛市 + 极度放量 = 过热预警模式
    # 经济学意义：情绪亢奋，可能短期见顶，逐步减仓
    "bull_extremely_high_volume": "过热预警"


# ------------------------------------------------------------
# 三、动态权重池 (Dynamic Factor Weights)
# ------------------------------------------------------------
# 根据不同市场环境，调整各因子的权重配置
# 权重总和应为 1.0（100%）
# ------------------------------------------------------------
factor_weights:
  # 因子定义说明：
  # - quality（质量因子）：FCF/净利润比率 + 利润增长率，衡量盈利质量
  # - momentum（动量因子）：价格突破 + 成交量放大，衡量趋势强度
  # - dividend（红利因子）：股息率 + 分红稳定性，衡量现金回报
  # - valuation（估值因子）：PE/PB 分位数，衡量安全边际

  # 【缩量防御模式】熊市底部，流动性枯竭
  # 策略逻辑：防守为主，高股息提供安全垫，低估值防范进一步下跌
  "缩量防御":
    quality: 0.25           # 质量因子 25% - 确保盈利真实性
    momentum: 0.10          # 动量因子 10% - 趋势较弱，降低权重
    dividend: 0.40          # 红利因子 40% - 高股息提供防御
    valuation: 0.25         # 估值因子 25% - 低估值增加安全边际

  # 【防守观望模式】下跌趋势，量能不足
  # 策略逻辑：继续防御，但开始关注质量改善的信号
  "防守观望":
    quality: 0.30           # 质量因子 30% - 聚焦真成长
    momentum: 0.10          # 动量因子 10% - 趋势未明
    dividend: 0.35          # 红利因子 35% - 保持防御属性
    valuation: 0.25         # 估值因子 25% - 安全边际

  # 【反弹博弈模式】下跌趋势中的反弹
  # 策略逻辑：快进快出，关注弹性，估值次之
  "反弹博弈":
    quality: 0.20           # 质量因子 20% - 短期反弹不苛求质量
    momentum: 0.35          # 动量因子 35% - 反弹需要动能
    dividend: 0.15          # 红利因子 15% - 防御需求降低
    valuation: 0.30         # 估值因子 30% - 超跌反弹看估值修复

  # 【区间震荡模式】方向不明，量能不足
  # 策略逻辑：高抛低吸，关注波动率，质量为先
  "区间震荡":
    quality: 0.35           # 质量因子 35% - 震荡中质量为王
    momentum: 0.15          # 动量因子 15% - 趋势不明显
    dividend: 0.25          # 红利因子 25% - 适度防御
    valuation: 0.25         # 估值因子 25% - 区间操作看估值

  # 【结构性行情模式】指数横盘，板块轮动
  # 策略逻辑：精选个股，质量 + 估值双轮驱动
  "结构性行情":
    quality: 0.35           # 质量因子 35% - 结构性分化看质量
    momentum: 0.20          # 动量因子 20% - 板块轮动需要动能
    dividend: 0.20          # 红利因子 20% - 适度配置
    valuation: 0.25         # 估值因子 25% - 估值匹配度重要

  # 【突破酝酿模式】量能积累，可能选择方向
  # 策略逻辑：适度激进，关注突破信号，动量权重提升
  "突破酝酿":
    quality: 0.25           # 质量因子 25% - 突破也需要基本面支撑
    momentum: 0.35          # 动量因子 35% - 突破核心看动能
    dividend: 0.15          # 红利因子 15% - 进攻时防御降低
    valuation: 0.25         # 估值因子 25% - 突破空间看估值

  # 【放量进攻模式】上升趋势，量价配合
  # 策略逻辑：积极参与，动量主导，享受趋势红利
  "放量进攻":
    quality: 0.25           # 质量因子 25% - 趋势中质量要求适度
    momentum: 0.40          # 动量因子 40% - 趋势交易核心
    dividend: 0.10          # 红利因子 10% - 进攻时防御最低
    valuation: 0.25         # 估值因子 25% - 防止过度高估

  # 【过热预警模式】情绪亢奋，可能见顶
  # 策略逻辑：逐步撤退，高估值 + 低质量最先剔除
  "过热预警":
    quality: 0.40           # 质量因子 40% - 泡沫期质量最重要
    momentum: 0.15          # 动量因子 15% - 警惕趋势反转
    dividend: 0.25          # 红利因子 25% - 回归防御
    valuation: 0.20         # 估值因子 20% - 高估值风险大


# ------------------------------------------------------------
# 四、硬性过滤条件 (Hard Filters)
# ------------------------------------------------------------
# 不满足以下条件的股票将直接剔除，不参与因子评分
# 经济学意义：规避系统性风险、流动性风险、治理风险
# ------------------------------------------------------------
filters:
  # --- 风险剔除 ---

  # 剔除 ST/*ST 股票
  # 经济学意义：财务异常或连续亏损，存在退市风险，机构资金通常回避
  exclude_st: true

  # 剔除退市警示股票
  # 经济学意义：基本面严重恶化，避免踩雷
  exclude_delisting_risk: true

  # 剔除重大违法强制退市风险股票
  # 经济学意义：治理风险极高，可能血本无归
  exclude_legal_risk: true

  # --- 新股剔除 ---

  # 上市不满 N 日的新股剔除
  # 经济学意义：新股价格波动大，缺乏足够历史数据验证，不确定性高
  min_listing_days: 250     # 约 1 年交易日，确保有完整财报数据

  # 剔除上市不满 N 日的新股（用于动量计算）
  # 经济学意义：动量因子需要足够历史数据计算，新股信号不可靠
  min_days_for_momentum: 60  # 至少 60 日用于计算技术指标

  # --- 市值过滤 ---

  # 最小市值门槛（亿元）
  # 经济学意义：
  # - 市值过小流动性差，机构资金进出困难
  # - 小市值公司抗风险能力弱，业绩波动大
  # - 50 亿是常见的中小盘分界线
  min_market_cap: 50        # 市值低于 50 亿剔除

  # 最大市值门槛（亿元），0 表示不限制
  # 经济学意义：超大市值股票弹性不足，不适合趋势策略
  max_market_cap: 0         # 0=不限制

  # --- 流动性过滤 ---

  # 最小日均成交额（亿元）
  # 经济学意义：
  # - 成交额过低说明流动性不足
  # - 影响实际交易执行，冲击成本过高
  min_avg_turnover: 0.5     # 日均成交额低于 5000 万剔除

  # 最小换手率（%）
  # 经济学意义：换手率过低说明股票缺乏关注度，可能长期横盘
  min_turnover_rate: 0.5    # 换手率低于 0.5% 剔除

  # --- 价格过滤 ---

  # 最小股价（元）
  # 经济学意义：
  # - 股价过低可能是边缘化股票
  # - 1 元以下是面值退市警戒线
  min_price: 2.0            # 股价低于 2 元剔除，远离面值退市风险

  # 最大股价（元），0 表示不限制
  # 经济学意义：股价过高可能流动性下降，散户参与度低
  max_price: 0              # 0=不限制

  # --- 财务健康过滤 ---

  # 剔除连续亏损股票
  # 经济学意义：连续亏损说明商业模式或经营环境存在严重问题
  exclude_continuous_loss: true

  # 最大亏损年数
  # 经济学意义：允许短期亏损，但长期亏损必须剔除
  max_loss_years: 2         # 连续 2 年亏损剔除

  # 最小净资产收益率（%）
  # 经济学意义：ROE 是衡量股东回报的核心指标，长期低于 5% 说明资本效率低下
  min_roe: -10              # ROE 低于 -10% 剔除（允许周期性波动）

  # 最大资产负债率（%）
  # 经济学意义：负债率过高存在偿债风险，尤其是民企
  # 注意：银行/保险等金融行业负债率天然较高，应区别对待
  max_debt_ratio: 80        # 资产负债率高于 80% 剔除

  # --- 行业/板块过滤 ---

  # 剔除金融行业（银行/保险/券商）
  # 经济学意义：
  # - 金融行业财务指标特殊（高杠杆是常态）
  # - 估值体系与其他行业不同
  # - 如策略不针对金融设计，建议剔除
  exclude_financials: false

  # 剔除科创板
  # 经济学意义：科创板波动大，涨跌幅限制不同（20%），风险特征不同
  exclude_star_market: false

  # 剔除北交所
  # 经济学意义：流动性相对较差，投资者门槛高
  exclude_bse: true


# ------------------------------------------------------------
# 五、选股执行配置 (Execution Settings)
# ------------------------------------------------------------
execution:
  # 每次扫描最大股票数量
  # 经济学意义：避免过度分散，聚焦优质标的
  max_selections: 20        # 最多选出 20 只股票

  # 最低综合得分门槛
  # 经济学意义：宁缺毋滥，分数过低说明当前没有合适机会
  min_total_score: 0.30     # 综合得分低于 0.3 不选

  # 单一行业最大持仓比例（%）
  # 经济学意义：避免行业集中度过高，分散非系统性风险
  max_sector_weight: 30     # 单一行业不超过 30%

  # 相关性剔除阈值
  # 经济学意义：选出股票之间相关性过高会降低分散效果
  max_correlation: 0.8      # 相关系数高于 0.8 只保留得分高的
